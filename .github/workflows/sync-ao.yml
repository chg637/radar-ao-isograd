name: Sync Radar AO (TED + BOAMP + Profils)

# Quand le workflow tourne :
on:
  schedule:
    # Tous les jours à 6h UTC (8h Paris en été, 7h en hiver)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Bouton "Run workflow" manuel dans l'onglet Actions
  push:
    branches: [main]
    paths:
      - 'sync_ted.js'
      - 'sync_boamp.js'
      - 'sync_profils.js'
      - 'merge_sources.js'
      - 'config/filters.json'
      - 'config/boamp.json'
      - 'config/profils_tier1.json'
      - '.github/workflows/sync-ao.yml'

jobs:
  sync:
    name: Pull TED + BOAMP + Profils, merge, auto-score
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nécessaire pour committer les nouveaux JSON

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (rien — fetch est natif Node 18+)
        run: npm install --omit=dev || echo "Pas de deps à installer"

      # === Source 1 : TED (Sprint 1) ===
      - name: Run sync_ted.js
        run: node sync_ted.js
        env:
          TZ: Europe/Paris
        continue-on-error: true   # si TED tombe, on garde BOAMP et Profils

      # === Source 2 : BOAMP (Sprint 2) ===
      - name: Run sync_boamp.js
        run: node sync_boamp.js
        env:
          TZ: Europe/Paris
        continue-on-error: true

      # === Source 3 : Profils Tier-1 via Apify (Sprint 2) ===
      - name: Run sync_profils.js
        run: node sync_profils.js
        env:
          TZ: Europe/Paris
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        continue-on-error: true

      # === Merge des 3 sources ===
      - name: Run merge_sources.js
        run: node merge_sources.js
        env:
          TZ: Europe/Paris

      - name: Show data dir
        run: |
          ls -la data/
          echo "--- latest.json (head) ---"
          head -60 data/latest.json

      - name: Copie latest.json dans dashboard/data pour Vercel
        run: |
          mkdir -p dashboard/data
          cp data/latest.json dashboard/data/latest.json

      - name: Commit & push si nouveaux JSON
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Radar AO Bot"
          git add data/ dashboard/data/
          if git diff --staged --quiet; then
            echo "Pas de changement à committer."
            exit 0
          fi
          git commit -m "data: sync TED+BOAMP+Profils $(date -u +%Y-%m-%dT%H:%MZ)"
          # Retry avec rebase si la branche distante a avancé entre le checkout
          # et le push (typique : commit manuel pendant que le workflow tourne).
          # Sur conflit dans data/, on garde la version du runner (la plus fraîche)
          # via --strategy-option=theirs. Le bot ne touche que data/ et dashboard/data/,
          # donc pas de risque d'écraser du code sensible.
          for i in 1 2 3; do
            if git push; then
              echo "Push OK (tentative $i)"
              exit 0
            fi
            echo "Push rejeté (tentative $i), pull --rebase --strategy-option=theirs puis retry"
            git pull --rebase --strategy-option=theirs origin main || {
              echo "Rebase a échoué malgré --theirs, abort et fallback"
              git rebase --abort 2>/dev/null || true
              # Fallback : on prend brutalement nos versions et on push
              git fetch origin main
              git reset --soft origin/main
              git add data/ dashboard/data/
              git commit -m "data: sync TED+BOAMP+Profils $(date -u +%Y-%m-%dT%H:%MZ) (force resolution)" || true
            }
          done
          echo "Push échoué après 3 tentatives"
          exit 1

      # Notification Slack si Go ferme (toutes sources confondues)
      # Active ce step en ajoutant le secret SLACK_WEBHOOK dans Settings > Secrets
      - name: Notification Slack si Go ferme
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "Pas de webhook Slack configuré, on skip."
            exit 0
          fi
          GO_COUNT=$(node -e "const d=require('./data/latest.json'); console.log(d.total_go || 0)")
          if [ "$GO_COUNT" -gt 0 ]; then
            BREAKDOWN=$(node -e "const d=require('./data/latest.json'); const s=d.sources_summary||{}; console.log(Object.entries(s).filter(([k,v])=>v.present).map(([k,v])=>k+':'+v.matched).join(' | '))")
            curl -X POST -H 'Content-Type: application/json' \
              --data "{\"text\": \"Radar AO — ${GO_COUNT} nouvel(s) AO Go ferme. Détail : ${BREAKDOWN}. Voir le dashboard.\"}" \
              "$SLACK_WEBHOOK" || true
          fi
